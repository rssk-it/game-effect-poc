<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FX Viewer | game-effect</title>
  </head>
  <body>
    <div id="viewer-root">
      <canvas id="fx-canvas"></canvas>
      <aside id="fx-panel">
        <h1>FX VIEWER</h1>
        <p class="hint">クリックでエフェクト再生 / ドラッグで視点回転</p>
        <div id="fx-buttons"></div>
        <div class="ctrl">
          <label>再生速度 <span id="speed-label">1.00x</span></label>
          <input id="speed" type="range" min="0.05" max="1.5" step="0.05" value="1" />
        </div>
        <div class="ctrl row">
          <label><input id="loop" type="checkbox" checked /> 自動リピート</label>
          <button id="replay">もう一度</button>
        </div>
        <div class="ctrl">
          <label><input id="wireframe" type="checkbox" /> ワイヤーフレーム表示</label>
        </div>
        <p id="fx-desc" class="desc"></p>
      </aside>
    </div>
    <script type="module" src="/src/viewer.ts"></script>
  </body>
</html>
